[project]
name = "devmemoryindex"
version = "0.1.0"
description = "Developer memory index"
requires-python = ">=3.12"
dependencies = []

[dependency-groups]
dev = [
    "pytest>=9.0",
    "sentence-transformers",
    "lancedb",
    "fastapi",
    "uvicorn"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["core", "api", "cli", "connectors", "daemon"]
